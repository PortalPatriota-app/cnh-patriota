<html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado Patriota</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&amp;display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --verde:  #009C3B;
    --amarelo:#FFDF00;
    --azul:   #002776;
    --preto:  #0d0d0d;
    --cinza:  #999;
    --borda:  #d8d4cc;
    --bg:     #f5f4f0;
  }

  body {
    background: var(--bg);
    font-family: 'Cinzel', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 64px;
  }

  header { text-align: center; margin-bottom: 44px; }

  .flag-bar {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 22px;
  }
  .flag-bar span { display: block; height: 3px; border-radius: 2px; }
  .flag-bar .g { width: 40px; background: var(--verde); }
  .flag-bar .y { width: 64px; background: var(--amarelo); }
  .flag-bar .b { width: 28px; background: var(--azul); }

  h1 {
    font-size: clamp(1.2rem, 3.2vw, 1.9rem);
    font-weight: 900;
    color: var(--azul);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .tagline {
    font-size: 0.65rem;
    color: var(--cinza);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .form-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 40px;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
    color: var(--preto);
    background: #fff;
    border: 1.5px solid var(--borda);
    border-radius: 6px;
    padding: 13px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: #c0bbb0; font-weight: 400; }
  input[type="text"]:focus {
    border-color: var(--azul);
    box-shadow: 0 0 0 3px rgba(0,39,118,0.09);
  }

  .btn-gerar {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #fff;
    background: var(--azul);
    border: none;
    border-radius: 6px;
    padding: 13px 26px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 2px 12px rgba(0,39,118,0.18);
  }
  .btn-gerar:hover  { background: #001a5c; transform: translateY(-1px); }
  .btn-gerar:active { transform: translateY(0); }

  .canvas-wrap {
    display: inline-block;
    border: 1px solid var(--borda);
    border-radius: 5px;
    overflow: hidden;
    box-shadow: 0 6px 32px rgba(0,0,0,0.11);
    background: #fff;
  }
  canvas { display: block; max-width: 100%; }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-dl {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border-radius: 6px;
    padding: 11px 26px;
    cursor: pointer;
    border: 1.5px solid;
    background: transparent;
    transition: all 0.16s;
  }
  .btn-png { color: var(--verde); border-color: var(--verde); }
  .btn-png:hover { background: var(--verde); color: #fff; transform: translateY(-1px); }
  .btn-pdf { color: var(--azul);  border-color: var(--azul);  }
  .btn-pdf:hover { background: var(--azul); color: #fff; transform: translateY(-1px); }
  .btn-dl:disabled { opacity: 0.28; cursor: not-allowed; transform: none !important; }

  .status {
    margin-top: 14px;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--cinza);
    text-transform: uppercase;
    min-height: 18px;
    text-align: center;
  }
</style>
<style>
  * {
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
    user-select: none !important;
  }
  input[type="text"] {
    -webkit-user-select: text !important;
    user-select: text !important;
  }
  canvas { pointer-events: none; }
</style></head>
<body>

<header>
  <div class="flag-bar">
    <span class="g"></span><span class="y"></span><span class="b"></span>
    <span class="y"></span><span class="g"></span>
  </div>
  <h1>Certificado Patriota</h1>
  <p class="tagline">Portal Patriota App</p>
</header>

<div class="form-row">
  <input type="text" id="nomeInput" placeholder="Digite o nome completo..." maxlength="50">
  <button class="btn-gerar" onclick="gerarCertificado()">Gerar</button>
</div>

<div class="canvas-wrap">
  <canvas id="certCanvas" width="820" height="580"></canvas>
</div>

<div class="actions">
  <button class="btn-dl btn-png" id="btnPng" onclick="downloadPNG()">⬇ Baixar PNG</button>
  <button class="btn-dl btn-pdf" id="btnPdf" onclick="downloadPDF()">⬇ Baixar PDF</button>
</div>

<div class="status" id="status">✦ Certificado gerado.</div>

<script>
const CERT_URL = 'https://i.imgur.com/dWIyASl.png';

// Coordenadas mapeadas por análise pixel da imagem de referência (2000×1414)
// A frase "Este certificado é orgulhosamente apresentado a:" ocupa:
//   X: 700→1861 (centro 1280.5px = 64.03%)
//   Y: 509→649  (bottom 649px = 45.90%)
// O nome deve ficar centralizado no mesmo X, com topo ~25px abaixo do bottom da frase
// Centro Y do nome em 51.77% (732px de 1414px)

// Posição mapeada por scan pixel-a-pixel da imagem de referência (2000×1414)
// Cluster do nome JORGE TEIXEIRA: Y 558→659, X 858→1809
const NOME_X_CENTER  = 0.66675;
const NOME_Y_CENTER  = 0.43034;

// Área útil direita do certificado
const AREA_X_LEFT  = 0.4290;   // X esq do nome = 42.90%
const AREA_X_RIGHT = 0.9045;   // X dir do nome = 90.45%

const canvas = document.getElementById('certCanvas');
const ctx    = canvas.getContext('2d');
const img    = new Image();
const MAX_W  = Math.min(window.innerWidth - 40, 820);
let imgLoaded = false;

img.crossOrigin = 'anonymous';
img.onload = () => {
  imgLoaded = true;
  const scale   = MAX_W / img.naturalWidth;
  canvas.width  = Math.round(img.naturalWidth  * scale);
  canvas.height = Math.round(img.naturalHeight * scale);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  setStatus('Pronto — digite o nome e clique em Gerar.');
};
img.onerror = () => setStatus('Erro ao carregar o certificado.');
img.src = CERT_URL;

function gerarCertificado() {
  const nome = document.getElementById('nomeInput').value.trim().toUpperCase();
  if (!nome) { setStatus('⚠ Digite um nome primeiro.'); return; }
  if (!imgLoaded) { setStatus('⚠ Aguarde a imagem carregar.'); return; }
  draw(canvas, ctx, canvas.width, canvas.height, nome);
  document.getElementById('btnPng').disabled = false;
  document.getElementById('btnPdf').disabled = false;
  setStatus('✦ Certificado gerado.');
}

function draw(cvs, c, W, H, nome) {
  c.clearRect(0, 0, W, H);
  c.drawImage(img, 0, 0, W, H);

  // Largura máxima disponível para o nome (área direita do certificado)
  const areaLeft  = AREA_X_LEFT  * W;
  const areaRight = AREA_X_RIGHT * W;
  const maxWidth  = areaRight - areaLeft;   // ~63% da largura total

  const x = NOME_X_CENTER * W;

  const y = NOME_Y_CENTER * H;

  // Começa com 100px escalado, reduz se necessário para caber
  const baseSize  = Math.round(100 * (W / img.naturalWidth));
  let   fontSize  = baseSize;

  c.font = `900 ${fontSize}px 'Cinzel', serif`;
  let measured = c.measureText(nome).width;

  // Reduz até caber dentro da área útil
  while (measured > maxWidth * 0.95 && fontSize > 20) {
    fontSize -= 2;
    c.font = `900 ${fontSize}px 'Cinzel', serif`;
    measured = c.measureText(nome).width;
  }

  c.textAlign    = 'center';
  c.textBaseline = 'middle';
  c.shadowBlur   = 0;
  c.fillStyle    = '#0d0d0d';
  c.fillText(nome, x, y);
}

function downloadPNG() {
  const nome = getNome(); if (!nome) return;
  setStatus('⏳ Gerando PNG…');
  const fc = fullCanvas(nome);
  fc.toBlob(blob => {
    trigger(URL.createObjectURL(blob), `certificado-${slug(nome)}.png`);
    setStatus('✦ PNG baixado.');
  }, 'image/png');
}

async function downloadPDF() {
  const nome = getNome(); if (!nome) return;
  setStatus('⏳ Gerando PDF…');
  try {
    const { jsPDF } = window.jspdf;
    const fc = fullCanvas(nome);
    const W  = img.naturalWidth, H = img.naturalHeight;
    const pdf = new jsPDF({
      orientation: W >= H ? 'landscape' : 'portrait',
      unit: 'px', format: [W, H], hotfixes: ['px_scaling']
    });
    pdf.addImage(fc.toDataURL('image/jpeg', 0.97), 'JPEG', 0, 0, W, H);
    pdf.save(`certificado-${slug(nome)}.pdf`);
    setStatus('✦ PDF baixado.');
  } catch(e) { setStatus('Erro: ' + e.message); }
}

function getNome() {
  const n = document.getElementById('nomeInput').value.trim().toUpperCase();
  if (!n) setStatus('⚠ Digite um nome primeiro.');
  return n;
}
function fullCanvas(nome) {
  const fc = document.createElement('canvas');
  fc.width = img.naturalWidth; fc.height = img.naturalHeight;
  draw(fc, fc.getContext('2d'), fc.width, fc.height, nome);
  return fc;
}
function trigger(href, name) {
  const a = document.createElement('a');
  a.href = href; a.download = name; a.click();
  URL.revokeObjectURL(href);
}
function slug(s) { return s.replace(/\s+/g, '-'); }
function setStatus(m) { document.getElementById('status').textContent = m; }

document.getElementById('nomeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') gerarCertificado();
});

// ── Proteções anti-cópia ──────────────────────────────
// Botão direito
document.addEventListener('contextmenu', e => e.preventDefault());

// Seleção de texto
document.addEventListener('selectstart', e => e.preventDefault());

// Arrastar imagens/elementos
document.addEventListener('dragstart', e => e.preventDefault());

// Atalhos de teclado
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;
  if (
    (ctrl && ['s','u','a','c','p'].includes(e.key.toLowerCase())) || // Salvar, Ver fonte, Selecionar tudo, Copiar, Imprimir
    e.key === 'F12' ||       // DevTools
    e.key === 'PrintScreen'  // Captura de tela (aviso apenas)
  ) {
    e.preventDefault();
  }
});

// CSS anti-seleção
const style = document.createElement('style');
style.textContent = `
  * {
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
    user-select: none !important;
  }
  input[type="text"] {
    -webkit-user-select: text !important;
    user-select: text !important;
  }
  canvas { pointer-events: none; }
`;
document.head.appendChild(style);
// ─────────────────────────────────────────────────────
</script>


</body></html>
