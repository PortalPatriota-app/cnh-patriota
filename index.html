<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador da Carterinha Nacional do Patriotismo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --verde: #009C2D;
    --verde-escuro: #007A22;
    --amarelo: #FFDF00;
    --azul: #002776;
    --preto: #111;
    --cinza: #f4f4f0;
    --cinza-escuro: #666;
    --borda: #e5e5e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(0, 156, 45, 0.1), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(255, 223, 0, 0.12), transparent 55%),
      #fafaf5;
    color: var(--preto);
    padding: 30px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 580px;
    background: white;
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 30px 80px -20px rgba(0, 39, 118, 0.22),
      0 12px 30px -10px rgba(0,0,0,0.1),
      0 0 0 1px rgba(0,0,0,0.04);
  }

  header {
    background: linear-gradient(135deg, var(--verde) 0%, var(--verde-escuro) 100%);
    color: white;
    padding: 34px 30px 30px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80%; right: -25%;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(255,223,0,0.28) 0%, transparent 65%);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--amarelo) 0%, var(--amarelo) 40%, transparent 40%);
  }
  header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 26px;
    letter-spacing: -0.6px;
    line-height: 1.05;
    position: relative;
    z-index: 1;
  }
  header h1 .acento { color: var(--amarelo); }
  header .tag {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.2px;
    background: var(--amarelo);
    color: var(--preto);
    border-radius: 4px;
    position: relative;
    z-index: 1;
  }

  form {
    padding: 26px 28px 6px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .campo { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--cinza-escuro);
  }
  input[type="text"], input[type="date"] {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    border: 2px solid var(--borda);
    border-radius: 10px;
    background: white;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    color: var(--preto);
    width: 100%;
  }
  input[type="text"]:focus, input[type="date"]:focus {
    border-color: var(--verde);
    box-shadow: 0 0 0 4px rgba(0, 156, 45, 0.12);
  }

  .foto-upload {
    position: relative;
    border: 2px dashed #d4d4ce;
    border-radius: 10px;
    padding: 22px 18px;
    text-align: center;
    cursor: pointer;
    background: var(--cinza);
    transition: border-color 0.15s, background 0.15s;
    overflow: hidden;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .foto-upload:hover {
    border-color: var(--verde);
    background: rgba(0, 156, 45, 0.04);
  }
  .foto-upload input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }
  .foto-upload .icone { font-size: 26px; opacity: 0.6; }
  .foto-upload .texto {
    font-size: 14px;
    font-weight: 600;
    color: var(--preto);
  }
  .foto-upload .sub {
    font-size: 12px;
    color: var(--cinza-escuro);
  }
  .foto-upload.tem-foto {
    padding: 14px;
    border-style: solid;
    border-color: var(--verde);
    background: white;
    flex-direction: row;
    text-align: left;
    gap: 12px;
  }
  .foto-upload.tem-foto .icone { display: none; }
  .foto-upload.tem-foto .preview { display: block; }
  .preview {
    display: none;
    width: 60px;
    height: 72px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  .foto-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .foto-info .nome-arq {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .botoes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    padding: 0 28px 28px;
  }
  button {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:not(:disabled):hover { transform: translateY(-1px); }
  button:not(:disabled):active { transform: translateY(0); }
  .btn-png {
    background: var(--azul);
    color: white;
    box-shadow: 0 6px 18px -4px rgba(0, 39, 118, 0.4);
  }
  .btn-pdf {
    background: linear-gradient(135deg, var(--verde) 0%, var(--verde-escuro) 100%);
    color: white;
    box-shadow: 0 6px 18px -4px rgba(0, 156, 45, 0.4);
  }

  .preview-wrapper {
    padding: 18px 28px 28px;
    border-top: 1px solid var(--borda);
    background: #fbfbf8;
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .preview-wrapper h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--cinza-escuro);
  }
  .id-gerado {
    font-size: 11px;
    color: var(--cinza-escuro);
  }
  .id-gerado strong { color: var(--preto); font-weight: 700; }

  .canvas-box {
    background: repeating-conic-gradient(#f0f0eb 0% 25%, #fafaf5 0% 50%) 50% / 14px 14px;
    padding: 14px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
  }
  #previewCanvas {
    width: 100%;
    max-width: 440px;
    height: auto;
    display: block;
    box-shadow: 0 6px 20px -4px rgba(0,0,0,0.15);
    border-radius: 4px;
  }
  .hint {
    font-size: 12px;
    color: var(--cinza-escuro);
    text-align: center;
    margin-top: 14px;
    font-style: italic;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--preto);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gerador da <span class="acento">Carterinha</span><br>Nacional do Patriotismo</h1>
    <span class="tag">#EUSOUPATRIOTA</span>
  </header>

  <form id="form" autocomplete="off">
    <div class="campo">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: André Mathias dos Santos" required>
    </div>

    <div class="campo">
      <label for="nascimento">Data de nascimento</label>
      <input type="date" id="nascimento" required>
    </div>

    <div class="campo">
      <label>Foto (3x4)</label>
      <div class="foto-upload" id="fotoBox">
        <input type="file" id="foto" accept="image/*">
        <img class="preview" id="fotoPreview" alt="">
        <div class="icone">📷</div>
        <div class="foto-info">
          <div class="texto nome-arq" id="fotoTexto">Clique para escolher uma foto</div>
          <div class="sub" id="fotoSub">Será recortada automaticamente (3x4)</div>
        </div>
      </div>
    </div>
  </form>

  <div class="botoes">
    <button type="button" class="btn-png" id="btnPng" disabled>
      <span>🖼</span> Baixar PNG
    </button>
    <button type="button" class="btn-pdf" id="btnPdf" disabled>
      <span>📄</span> Baixar PDF
    </button>
  </div>

  <div class="preview-wrapper">
    <div class="preview-header">
      <h2>Pré-visualização</h2>
      <div class="id-gerado">ID: <strong id="idLabel">—</strong></div>
    </div>
    <div class="canvas-box">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="hint" id="hint">Preencha todos os campos para habilitar o download</div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============================================
// POSICIONAMENTO (coordenadas no canvas 552×728)
// ============================================
const CONFIG = {
  LARGURA: 552,
  ALTURA: 728,

  // Retângulo da FOTO (substitui o verde)
  FOTO: { x: 46, y: 31, w: 121, h: 141 },

  // NOME (azul escuro) — baseline
  NOME: {
    x: 228,
    baselineY: 170,
    maxWidth: 310,
    cor: '#002776',
    fontWeight: 'bold',
    fontSizeBase: 17,
    fontSizeMin: 11,
    fontFamily: "'Inter', Arial, sans-serif",
  },

  // VALOR do PATRIOTA ID (preto) — baseline
  PATRIOTA_ID: {
    x: 306,
    baselineY: 200,
    cor: '#111',
    font: "13px 'Inter', Arial, sans-serif",
  },

  // VALOR do NASCIMENTO (preto) — baseline
  NASCIMENTO: {
    x: 318,
    baselineY: 223,
    cor: '#111',
    font: "13px 'Inter', Arial, sans-serif",
  },
};

// ============================================
// ESTADO
// ============================================
const state = {
  molde: null,
  fotoUser: null,
  nome: '',
  nascimento: '',
  patriotaId: '',
};

// ============================================
// HELPERS
// ============================================
function gerarPatriotaId() {
  const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  return `${rnd(100,999)}-${rnd(100,999)}-${rnd(1000,9999)}`;
}

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function formatarData(iso) {
  if (!iso) return '';
  const [ano, mes, dia] = iso.split('-');
  return `${dia} de ${MESES[parseInt(mes,10)-1]}, ${ano}`;
}

function carregarImagem(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Falha ao carregar imagem'));
    img.src = src;
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function slugify(s) {
  return (s || 'patriota')
    .toString()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_|_$/g, '') || 'patriota';
}

function ajustarFonteNome(ctx, texto) {
  const { fontSizeBase, fontSizeMin, maxWidth, fontWeight, fontFamily } = CONFIG.NOME;
  let tam = fontSizeBase;
  ctx.font = `${fontWeight} ${tam}px ${fontFamily}`;
  while (ctx.measureText(texto).width > maxWidth && tam > fontSizeMin) {
    tam -= 0.5;
    ctx.font = `${fontWeight} ${tam}px ${fontFamily}`;
  }
  return tam;
}

// ============================================
// DESENHO DA CNH COMPLETA (canvas = só a carteirinha)
// ============================================
async function desenharCNH(canvas) {
  if (!state.molde) return;
  canvas.width = CONFIG.LARGURA;
  canvas.height = CONFIG.ALTURA;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // 1. Molde HD de fundo
  ctx.drawImage(state.molde, 0, 0, CONFIG.LARGURA, CONFIG.ALTURA);

  // 2. Foto do usuário (recorte centralizado preservando proporção)
  if (state.fotoUser) {
    const { x, y, w, h } = CONFIG.FOTO;
    const imgW = state.fotoUser.width;
    const imgH = state.fotoUser.height;
    const ratioDest = w / h;
    const ratioSrc = imgW / imgH;
    let srcX, srcY, srcW, srcH;
    if (ratioSrc > ratioDest) {
      srcH = imgH;
      srcW = imgH * ratioDest;
      srcX = (imgW - srcW) / 2;
      srcY = 0;
    } else {
      srcW = imgW;
      srcH = imgW / ratioDest;
      srcX = 0;
      srcY = (imgH - srcH) / 2;
    }
    ctx.drawImage(state.fotoUser, srcX, srcY, srcW, srcH, x, y, w, h);
  }

  ctx.textBaseline = 'alphabetic';

  // 3. NOME
  if (state.nome) {
    const nomeUpper = state.nome.toUpperCase();
    ajustarFonteNome(ctx, nomeUpper);
    ctx.fillStyle = CONFIG.NOME.cor;
    ctx.fillText(nomeUpper, CONFIG.NOME.x, CONFIG.NOME.baselineY);
  }

  // 4. PATRIOTA ID
  if (state.patriotaId) {
    ctx.font = CONFIG.PATRIOTA_ID.font;
    ctx.fillStyle = CONFIG.PATRIOTA_ID.cor;
    ctx.fillText(state.patriotaId, CONFIG.PATRIOTA_ID.x, CONFIG.PATRIOTA_ID.baselineY);
  }

  // 5. NASCIMENTO
  if (state.nascimento) {
    ctx.font = CONFIG.NASCIMENTO.font;
    ctx.fillStyle = CONFIG.NASCIMENTO.cor;
    ctx.fillText(formatarData(state.nascimento), CONFIG.NASCIMENTO.x, CONFIG.NASCIMENTO.baselineY);
  }
}

// ============================================
// PREVIEW
// ============================================
async function atualizarPreview() {
  const canvas = document.getElementById('previewCanvas');
  await desenharCNH(canvas);
  verificarCampos();
}

function verificarCampos() {
  const ok = state.nome.trim() && state.nascimento && state.fotoUser;
  document.getElementById('btnPng').disabled = !ok;
  document.getElementById('btnPdf').disabled = !ok;
  document.getElementById('hint').textContent = ok
    ? 'Pronto! Baixe em PNG (só a carteirinha) ou PDF (folha A4 para imprimir)'
    : 'Preencha todos os campos para habilitar o download';
}

// ============================================
// DOWNLOADS
// ============================================
async function baixarPNG() {
  // PNG = canvas exato (552x728), sem margens — carteirinha pura
  const canvas = document.createElement('canvas');
  await desenharCNH(canvas);

  const link = document.createElement('a');
  link.download = `carterinha_${slugify(state.nome)}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('PNG baixado!');
}

async function baixarPDF() {
  // PDF A4: carteirinha centralizada horizontalmente, no topo
  const canvas = document.createElement('canvas');
  await desenharCNH(canvas);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const pageW = 210;
  const pageH = 297;

  // Dimensões do canvas em mm — regra: largura da carteirinha ~ 115mm (padrão A3 do molde proporcional)
  // Ratio original: 552 / 728 = 0.758
  // Na A4 queremos o mesmo tamanho visual que o PDF original
  // PDF original: 842x1190 pts (A3), carteirinha ocupava 0-551 px em 150 DPI = 
  // 552 px / 150 DPI = 3.68 polegadas = ~93.5 mm de largura
  const imgW_mm = 93.5;
  const imgH_mm = imgW_mm * (canvas.height / canvas.width);

  const x = (pageW - imgW_mm) / 2;
  const y = 15; // margem superior

  const imgData = canvas.toDataURL('image/png');
  pdf.addImage(imgData, 'PNG', x, y, imgW_mm, imgH_mm);
  pdf.save(`carterinha_${slugify(state.nome)}.pdf`);
  toast('PDF baixado!');
}

// ============================================
// EVENTOS
// ============================================
document.getElementById('nome').addEventListener('input', (e) => {
  state.nome = e.target.value;
  atualizarPreview();
});

document.getElementById('nascimento').addEventListener('input', (e) => {
  state.nascimento = e.target.value;
  atualizarPreview();
});

document.getElementById('foto').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  try {
    const img = await carregarImagem(url);
    state.fotoUser = img;

    const box = document.getElementById('fotoBox');
    const preview = document.getElementById('fotoPreview');
    preview.src = url;
    box.classList.add('tem-foto');
    document.getElementById('fotoTexto').textContent = file.name;
    document.getElementById('fotoSub').textContent = 'Clique para trocar a foto';

    atualizarPreview();
  } catch (err) {
    toast('Erro ao carregar imagem');
  }
});

document.getElementById('btnPng').addEventListener('click', baixarPNG);
document.getElementById('btnPdf').addEventListener('click', baixarPDF);

// ============================================
// INIT
// ============================================
(async function init() {
  state.patriotaId = gerarPatriotaId();
  document.getElementById('idLabel').textContent = state.patriotaId;
  try {
    state.molde = await carregarImagem(MOLDE_SRC);
    await atualizarPreview();
  } catch (err) {
    toast('Erro ao carregar molde');
    console.error(err);
  }
})();
</script>
